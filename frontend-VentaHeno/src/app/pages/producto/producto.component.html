<div class="productos-container">
  <div class="header">
    <h1>Nuestros Productos de Heno</h1>
    <p>Calidad premium para tus animales</p>
  </div>
  <div class="search-and-create-container">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Buscar heno por nombre..." #searchInput
        (keyup.enter)="buscarHenosPorNombre(searchInput.value)" (input)="0">
      <button *ngIf="searchInput.value" class="btn-limpiar" (click)="searchInput.value=''; buscarHenosPorNombre('')"
        title="Limpiar búsqueda">
        ✕
      </button>
      <button class="btn-buscar" (click)="buscarHenosPorNombre(searchInput.value)">
        Buscar
      </button>
    </div>
    <button class="btn-crear" (click)="abrirModalLogin()">
      <span>🔒</span> Modo Admin
    </button>
  </div>

  <div class="filtros-container">
    <button class="filtro-btn" (click)="cargarHenos()">
      <div class="filtro-img-placeholder">🌾</div>
      <span>Todos</span>
    </button>
    <button class="filtro-btn" (click)="filtrarHenos('Bovinos')">
      <img src="assets/Imagenes/vaca.png" alt="Vacas" class="filtro-img">
      <span>Bovinos</span>
    </button>
    <button class="filtro-btn" (click)="filtrarHenos('Ovinos')">
      <img src="assets/Imagenes/oveja.png" alt="Ovejas" class="filtro-img">
      <span>Ovinos</span>
    </button>
    <button class="filtro-btn" (click)="filtrarHenos('Equinos')">
      <img src="assets/Imagenes/caballo.png" alt="Caballo" class="filtro-img">
      <span>Equinos</span>
    </button>
  </div>

  <div *ngIf="henos.length > 0" class="grid-productos">
    <div class="producto-card" *ngFor="let heno of henos" (click)="detallePorId(heno.idHeno)">
      <div class="card-imagen">
        <img *ngIf="heno.imagen" [src]="heno.imagen" [alt]="heno.nombre">
        <div *ngIf="!heno.imagen" class="placeholder-imagen">
          <span>🌿</span>
        </div>
      </div>
      <div class="card-content">
        <h2>{{ heno.nombre }}</h2>
        <p class="descripcion">{{ heno.descripcionCorta }}</p>

        <div class="detalles">
          <div class="precio">
            <span class="label">Precio Unitario</span>
            <span class="valor">${{ heno.precioU }}</span>
          </div>

          <div class="stock">
            <span class="label">Stock Disp.</span>
            <span class="valor">{{ heno.stock }} und </span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Popup para Login de Admin -->
  <div class="modal-overlay" *ngIf="mostrarModalLogin" (click)="cerrarModalLogin()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>Ingreso Administrador</h2>
        <button class="modal-close-btn" (click)="cerrarModalLogin()">×</button>
      </div>
      <div class="modal-body">
        <form (ngSubmit)="submitLoginAdmin()">
          <div class="form-group-modal">
            <label for="idAdmin">ID Administrador</label>
            <input type="number" id="idAdmin" name="idAdmin" [(ngModel)]="idAdminInput" required
              placeholder="Ingrese su ID de Admin">
          </div>
          <div class="form-group-modal">
            <label for="clave">Contraseña</label>
            <input type="password" id="clave" name="clave" [(ngModel)]="claveInput" required
              placeholder="Ingrese su contraseña">
          </div>
          <div class="error-message-modal" *ngIf="loginError">
            ⚠️ {{ loginError }}
          </div>
          <div class="modal-actions">
            <button type="button" class="btn-cancelar" (click)="cerrarModalLogin()">Cancelar</button>
            <button type="submit" class="btn-ingresar">Ingresar</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
