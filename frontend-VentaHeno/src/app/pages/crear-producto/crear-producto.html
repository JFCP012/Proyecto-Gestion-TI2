<div class="crear-container">
    <div style="margin-bottom: 1.5rem;">
        <button (click)="volver()"
            style="background: none; border: none; color: #38a169; font-weight: 600; font-size: 1rem; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; padding: 0;">
            ← Volver a la lista
        </button>
    </div>

    <div class="card-form">
        <div class="form-header">
            <h2>Crear Nuevo Producto de Heno</h2>
            <p>Complete los datos para registrar un nuevo lote de heno</p>
        </div>

        <!-- Mensajes de Estado -->
        <div *ngIf="successMsg" class="alert alert-success">
            {{ successMsg }}
        </div>
        <div *ngIf="errorMsg" class="alert alert-error">
            {{ errorMsg }}
        </div>

        <form (ngSubmit)="crearHeno()" #henoForm="ngForm">
            <div class="form-grid">
                <!-- Nombre -->
                <div class="form-group">
                    <label for="nombre">Nombre del Producto</label>
                    <input type="text" id="nombre" name="nombre" [(ngModel)]="heno.nombre" required
                        placeholder="Ej. Heno Alfalfa Premium">
                </div>

                <!-- Stock -->
                <div class="form-group">
                    <label for="stock">Stock (kg)</label>
                    <input type="number" id="stock" name="stock" [(ngModel)]="heno.stock" required min="1"
                        placeholder="Ej. 500">
                </div>
                <!-- Precio Unitario (Venta) -->
                <div class="form-group">
                    <label for="precioU">Precio de Venta Unitario ($)</label>
                    <input type="number" id="precioU" name="precioU" [(ngModel)]="heno.precioU" required min="1"
                        placeholder="Ej. 180">
                </div>

                <!-- Fecha Entrada -->
                <div class="form-group">
                    <label for="fechaEntrada">Fecha de Entrada</label>
                    <input type="date" id="fechaEntrada" name="fechaEntrada" [(ngModel)]="heno.fechaEntrada" required>
                </div>

                <!-- Estado -->
                <div class="form-group group-estado">
                    <label for="estado">Estado</label>
                    <select id="estado" name="estado" [(ngModel)]="heno.estado" required>
                        <option value="" disabled selected>Seleccione un estado</option>
                        <option value="Excelente">Excelente</option>
                        <option value="Bueno">Bueno</option>
                        <option value="Regular">Regular</option>
                    </select>
                </div>

                <!-- Descripción Corta -->
                <div class="form-group full-width">
                    <label for="descripcionCorta">Descripción Corta</label>
                    <textarea id="descripcionCorta" name="descripcionCorta" [(ngModel)]="heno.descripcionCorta" rows="2"
                        placeholder="Resumen breve del producto" required></textarea>
                </div>
                <!-- Descripción Larga -->
                <div class="form-group full-width">
                    <label for="descripcionLarga">Descripción Larga</label>
                    <textarea id="descripcionLarga" name="descripcionLarga" [(ngModel)]="heno.descripcionLarga" rows="4"
                        placeholder="Detalles completos sobre el lote, origen, calidad, etc." required></textarea>
                </div>

                <!-- Imagen -->
                <div class="form-group full-width">
                    <label>Imagen del Producto</label>
                    <div class="upload-zone">
                        <!-- Si no hay imagen seleccionada -->
                        <div *ngIf="!imagenPreview" class="upload-placeholder">
                            <span class="upload-icon">📸</span>
                            <span class="upload-text">Haga clic o arrastre una imagen aquí</span>
                        </div>

                        <!-- Si hay imagen seleccionada, mostrar vista previa -->
                        <div *ngIf="imagenPreview" class="preview-container">
                            <img [src]="imagenPreview" alt="Vista previa de la imagen" class="preview-img">
                            <div class="preview-overlay">
                                <span>Cambiar Imagen</span>
                            </div>
                        </div>

                        <input type="file" id="imagen" class="file-input" (change)="onFileSelected($event)"
                            accept="image/*">
                    </div>
                </div>
            </div>
            <!-- Animales -->
            <div class="form-group group-estado full-width">
                <label>Animales a los que está destinado</label>
                <div style="display: flex; gap: 1.5rem; flex-wrap: wrap; margin-top: 0.5rem;">
                    <label
                        style="display: flex; align-items: center; gap: 0.5rem; font-weight: normal; cursor: pointer;">
                        <input type="checkbox" [checked]="idAnimales.includes(1)" (change)="toggleAnimal($event, 1)">
                        Bovinos
                    </label>
                    <label
                        style="display: flex; align-items: center; gap: 0.5rem; font-weight: normal; cursor: pointer;">
                        <input type="checkbox" [checked]="idAnimales.includes(2)" (change)="toggleAnimal($event, 2)">
                        Equinos
                    </label>
                    <label
                        style="display: flex; align-items: center; gap: 0.5rem; font-weight: normal; cursor: pointer;">
                        <input type="checkbox" [checked]="idAnimales.includes(3)" (change)="toggleAnimal($event, 3)">
                        Ovinos
                    </label>
                </div>
            </div>

            <!-- Acciones -->
            <div class="form-actions">
                <button type="submit" class="btn-submit" [disabled]="!henoForm.form.valid || !imagen || loading">
                    {{ loading ? 'Guardando...' : 'Crear Producto' }}
                </button>
            </div>
        </form>
    </div>
</div>
