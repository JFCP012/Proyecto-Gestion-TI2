spring.application.name=ventaHeno


spring.datasource.url=jdbc:postgresql://localhost:5432/ventaHeno
spring.datasource.username=postgres
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Quita el WARNING del log
spring.jpa.open-in-view=false

# Opcional pero recomendado: especifica el dialecto explícitamente
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configuracion para permitir subir imagenes de hasta 10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB